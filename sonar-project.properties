# Exclude stats dashboard pages from duplication — Recharts chart components
# require identical boilerplate (CartesianGrid, XAxis, YAxis, Tooltip, ResponsiveContainer)
# that is unavoidably repeated across chart-heavy pages.
sonar.cpd.exclusions=src/app/dashboard/**/*-stats/**,src/app/dashboard/**/*-stats/*.tsx
